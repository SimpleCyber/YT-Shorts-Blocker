<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusShield</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            width: 320px;
            padding: 24px;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo-shield {
            font-size: 24px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .status-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .status-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .status-value {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: #4f46e5;
            box-shadow: 0 6px 16px var(--primary-glow);
        }

        .footer {
            margin-top: 16px;
            text-align: center;
        }

        .privacy-link {
            font-size: 11px;
            color: var(--text-dim);
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .privacy-link:hover {
            opacity: 1;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo-shield">🛡️</span>
        <span class="logo-text">FocusShield</span>
    </div>

    <div class="status-card">
        <div class="status-label">Protection Status</div>
        <div class="status-value">
            <span class="status-dot"></span>
            Active & Shielding
        </div>
    </div>

    <button class="action-btn" id="open-settings">
        <i class="fas fa-cog"></i>
        Dashboard & Settings
    </button>

    <div class="footer">
        <a href="privacy.html" target="_blank" class="privacy-link">Privacy Policy</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
