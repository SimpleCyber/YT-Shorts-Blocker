<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FocusShield</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #f59e0b;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(99, 102, 241, 0.15), transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(245, 158, 11, 0.05), transparent 40%);
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-shield {
            font-size: 32px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        /* Block List */
        .block-list {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .block-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .block-item:last-child {
            border-bottom: none;
        }

        .block-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .remove-site {
            color: var(--danger);
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            padding: 8px;
        }

        .remove-site:hover {
            opacity: 1;
        }

        .add-site-wrap {
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            width: 100%;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
        }

        /* Duration Grid */
        .duration-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .duration-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .duration-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .duration-option.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: #1e293b;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .lock-status {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--danger);
            font-weight: 600;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-shield">🛡️</span>
                <span class="logo-text">FocusShield</span>
            </div>
            <a href="privacy.html" target="_blank" style="color: var(--text-dim); text-decoration: none; font-size: 14px;">Privacy Policy</a>
        </header>

        <main class="grid">
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-list"></i>
                    Blocking Control
                </div>
                
                <section>
                    <label class="section-label">Website Block List</label>
                    <div class="block-list" id="sites-list">
                        <!-- Sites injected here -->
                    </div>
                    <div class="add-site-wrap">
                        <input type="text" id="site-input" placeholder="e.g. facebook.com">
                        <button class="btn" id="add-btn">Add Site</button>
                    </div>
                    <div id="site-error" style="color: var(--danger); font-size: 12px; margin-top: 8px; display: none;">Site already in list</div>
                </section>
            </div>

            <div class="card">
                <div class="card-title">
                    <i class="fas fa-clock"></i>
                    Configurations
                </div>

                <section style="margin-bottom: 40px;">
                    <label class="section-label">Focus Timer Duration</label>
                    <div class="duration-grid" id="timer-options">
                        <div class="duration-option" data-value="60">1 Min</div>
                        <div class="duration-option" data-value="300">5 Min</div>
                        <div class="duration-option" data-value="600">10 Min</div>
                        <div class="duration-option" data-value="1800">30 Min</div>
                        <div class="duration-option" data-value="3600">1 Hour</div>
                        <div class="duration-option" data-value="7200">2 Hours</div>
                    </div>
                </section>

                <section>
                    <label class="section-label">Secure Mode (Locked Settings)</label>
                    <div class="duration-grid" id="lock-options">
                        <div class="duration-option lock-opt" data-days="1">1 Day</div>
                        <div class="duration-option lock-opt" data-days="3">3 Days</div>
                        <div class="duration-option lock-opt" data-days="7">1 Week</div>
                    </div>
                    <button class="btn btn-danger" id="lock-btn">LOCK DASHBOARD</button>
                    <div id="lock-timer" class="lock-status" style="display: none;">
                        <i class="fas fa-lock"></i>
                        <span id="lock-time-left"></span>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Modal for confirmation -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 style="margin-bottom: 15px;">Are you sure?</h2>
            <p style="color: var(--text-dim); margin-bottom: 25px; line-height: 1.5;" id="modal-msg"></p>
            <div style="display: flex; justify-content: flex-end; gap: 12px;">
                <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text-dim);" id="modal-cancel">Cancel</button>
                <button class="btn" style="background: var(--danger);" id="modal-confirm">Proceed</button>
            </div>
        </div>
    </div>

    <script src="options.js"></script>
</body>
</html>
